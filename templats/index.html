<!DOCTYPE html>
<html>
<head>
<title>Student Stress Survey</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:400px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h1{
text-align:center;
}

button{
width:100%;
padding:10px;
background:#2ecc71;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>Student Stress Survey</h1>

<form method="post">

Name:<br>
<input type="text" name="name" required><br><br>

{% for i in range(1,11) %}
Question {{i}}:<br>
<input type="radio" name="q{{i}}" value="yes"> Yes
<input type="radio" name="q{{i}}" value="no"> No
<br><br>
{% endfor %}

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
